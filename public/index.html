function spKey(v){return(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}
function nSP(sp){if(typeof sp==='string')return{id:'sp_'+spKey(sp),name:sp,level:1,school:'Oficial',notes:'',summary:''};return{id:sp?.id||('sp_'+Math.random().toString(36).slice(2,10)),name:sp?.name||'Hechizo',level:Math.max(1,sp?.level||1),school:sp?.school||'Oficial',notes:sp?.notes||'',summary:sp?.summary||''};}
function uq(a){return{...a,clase_habilidades:a.clase_habilidades||{},hechizos:(a.hechizos||[]).map(nSP)};}
function iCS(cls){const o={};(CD[cls]?.skills||[]).forEach(s=>o[s]=0);return o;}
function uC(a,cls){const q=uq(a);return{...q,clase:cls,clase_habilidades:cls?(q.clase===cls&&Object.keys(q.clase_habilidades||{}).length?q.clase_habilidades:iCS(cls)):{} };} 
function xPS(a){return Object.values(uq(a).clase_habilidades).reduce((s,v)=>s+(v||0),0)+(uq(a).hechizos.length||0);}
function xPR(a){return Math.max(0,(a.experiencia||0)-xPS(a));}
function gSE(n,l,src){const d=SD[n]||{};return{name:n,level:l||1,source:src||d.cat||'Habilidad',summary:d.summary||'Resumen pendiente de verificar en manual oficial.',tags:d.tags||[]};}
function gSL(a){const q=uq(a),ls=[];(q.innatas||[]).forEach(n=>ls.push(gSE(n,1,'Innata')));Object.entries(q.clase_habilidades||{}).forEach(([n,l])=>{if(l>0)ls.push(gSE(n,l,q.clase||'Clase'));});return ls;}
function gRL(a){return Math.max(1,a?.rango||1);}
function gSPL(a){return uq(a).hechizos||[];}
function gOSP(a){const cls=uq(a).clase;return(OFFICIAL_SPELLS[cls]||[]).map(sp=>nSP({...sp,id:'off_'+spKey(cls)+'_'+spKey(sp.name),school:'Oficial',...(OFFICIAL_SPELL_DETAILS[sp.name]||{}),...((CLASS_SPELL_NOTES[cls]||{})[sp.name]?{notes:CLASS_SPELL_NOTES[cls][sp.name]}:{})}));}
function gASP(a){const learned=new Set(gSPL(a).map(sp=>spKey(sp.name)));return gOSP(a).filter(sp=>sp.level<=gRL(a)&&!learned.has(spKey(sp.name)));}
function canLearnSpell(a,l){return !!CD[uq(a).clase]?.spell&&l<=gRL(a)&&xPR(a)>0;}
function mMU(ms,setMs){if(!ms||ms.magia_usada)return;setMs({...ms,magia_usada:true,amenaza_nivel:ms.amenaza_nivel+1});}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maladum">
  <meta name="theme-color" content="#0c0c1d">
  <link rel="manifest" href="/manifest.json">
  <title>Maladum Companion</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #0c0c1d; }
    body { color: #d4b896; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    (function () {
      const PREFIX = "maladum_storage:";
      window.storage = {
        async get(key) {
          const value = localStorage.getItem(PREFIX + key);
          return value == null ? null : { value };
        },
        async set(key, value) {
          localStorage.setItem(PREFIX + key, value);
        },
        async delete(key) {
          localStorage.removeItem(PREFIX + key);
        },
        async list(prefix) {
          const keys = [];
          const fullPrefix = PREFIX + (prefix || "");
          for (let i = 0; i < localStorage.length; i += 1) {
            const rawKey = localStorage.key(i);
            if (rawKey && rawKey.startsWith(fullPrefix)) {
              keys.push(rawKey.slice(PREFIX.length));
            }
          }
          return { keys };
        }
      };
    })();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
